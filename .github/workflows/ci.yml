name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 src/ api/ dashboard/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings only (don't fail on style)
          flake8 src/ api/ dashboard/ scripts/ --count --exit-zero --max-line-length=120 --statistics

      - name: Verify imports
        run: |
          python -c "from src.utils.config_loader import load_config; print('[OK] config_loader')"
          python -c "from src.models.cnn import SimpleCNN; print('[OK] SimpleCNN')"
          python -c "from src.datasets_partition.dataset import get_pathmnist; print('[OK] dataset')"
          python -c "from src.datasets_partition.partition import partition_data; print('[OK] partition')"
          python -c "from src.training.train import train_one_epoch, evaluate; print('[OK] train')"
          python -c "from src.federated.client import FederatedClient; print('[OK] client')"
          python -c "from src.privacy.dp_utils import make_private; print('[OK] dp_utils')"

      - name: Test model architecture
        run: |
          python -m src.models.cnn

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fl-system:test .

      - name: Verify container starts
        run: |
          docker run -d --name fl-test -p 8000:8000 fl-system:test
          sleep 5
          docker logs fl-test
          docker stop fl-test
